# ──────────────────────────────────────────────
# Application Settings
# ──────────────────────────────────────────────
spring.application.name=automation-framework
server.port=8080

# ──────────────────────────────────────────────
# MySQL Database (Production) - DISABLED
# ──────────────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/automationdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=123456789
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.hibernate.ddl-auto=update
# spring.h2.console.enabled=false

# ──────────────────────────────────────────────
# H2 In-Memory Database (Development) - ENABLED
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:automationdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ──────────────────────────────────────────────
# Selenium
# ──────────────────────────────────────────────
selenium.browser=chrome
selenium.headless=true
selenium.timeout=10
selenium.window.size=1920,1080
selenium.screenshots.enabled=true
selenium.screenshots.directory=src/main/resources/screenshots

# ──────────────────────────────────────────────
# Parallel Execution
# ──────────────────────────────────────────────
test.parallel.threads=4

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.com.example.framework=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.seleniumhq.selenium=INFO
logging.level.io.rest-assured=INFO
logging.file.name=src/main/resources/logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%

# ──────────────────────────────────────────────
# Swagger
# ──────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
