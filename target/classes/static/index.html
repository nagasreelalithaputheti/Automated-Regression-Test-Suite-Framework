<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Test Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5b7cff 0%, #a855f7 100%);
            min-height: 100vh;
            display: flex;
            color: #1f2937;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-right: none;
            overflow-y: auto;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: #5b7cff;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 15px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: #f3f4f6;
            color: #5b7cff;
        }

        .nav-item.active {
            background: #5b7cff;
            color: white;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2em;
            color: white;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .button-grid.full {
            grid-template-columns: 1fr;
        }

        .btn {
            padding: 16px 20px;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: white;
            color: #5b7cff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-ui {
            border-color: white;
            color: white;
        }

        .btn-ui:hover {
            background: white;
            color: #5b7cff;
        }

        .btn-api {
            border-color: white;
            color: white;
        }

        .btn-api:hover {
            background: white;
            color: #5b7cff;
        }

        .btn-all {
            border-color: white;
            color: white;
            grid-column: 1 / -1;
        }
white;
            color: #5b7cff;
        }

        .secondary-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-secondary {
            padding: 14px;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-secondary:hover {
            border-color: white;
            color: #5b7cff;
            background: white;
            transform: translateY(-2px);
        }

        .btn-dashboard {
            border-color: white;
            color: white;
        }

        .btn-report {
            border-color: white;
            color: white
            border-color: #8b5cf6;
            color: #8b5cf6;
        }

        .status-message {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            border: 1px solid;
        }

        .status-message.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #7f1d1d;
        }

        .status-message.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: #065f46;
        }

        .status-message.info {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-color: #1e3a8a;
        }

        .results-panel {white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .results-panel.show {
            display: block;
        }

        .results-panel h2 {
            color: #5b7cff;
            margin-bottom: 25px;
            font-size: 1.5em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .result-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .result-number {
            font-size: 2.2em;
            font-weight: bold;
            color: #5b7cff;
            margin-bottom: 8px;
        }

        .result-number.passed {
            color: #10b981;
        }

        .result-number.failed {
            color: #ef4444;
        }

        .result-label {
            font-size: 0.85em;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .test-details-list {
            background: #ffffff;
            border-radius: 8px;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
        }

        .test-item {
            padding: 12px;
            margin: 8px 0;
            border-left: 4px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.9em;
            background: #f9fafb;
            color: #1f2937;
        }

        .test-item.passed {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .test-item.failed {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .test-item-name {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .test-item-time {
            color: #6b7280;
            font-size: 0.85em;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #5b7cff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader.show {
            display: block;
        }

        @media (max-width: 1000px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
                border-right: none;
                border-bottom: none;
            }

            .main-content {
                margin-left: 0;
                padding: 30px 20px;
            }

            .nav-menu {
                display: flex;
                gap: 10px;
                overflow-x: auto;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            ⚙️ Test Framework
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="navigate('dashboard')">
                📊 Dashboard
            </li>
            <li class="nav-item" onclick="navigate('tests')">
                🧪 Test Execution
            </li>
            <li class="nav-item" onclick="navigate('reports')">
                📋 Reports
            </li>
            <li class="nav-item" onclick="navigate('analytics')">
                📈 Analytics
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Automation Test Framework</h1>
            <p>Run and manage your test execution with ease</p>
        </div>

        <div class="button-grid">
            <button class="btn btn-ui" onclick="runUITest()">🌐 Run UI Test</button>
            <button class="btn btn-api" onclick="runAPITest()">📡 Run API Test</button>
            <button class="btn btn-all" onclick="runAllTests()">▶️ Run All Tests</button>
        </div>

        <div class="secondary-buttons">
            <button class="btn-secondary btn-dashboard" onclick="viewDashboard()">📈 View Dashboard</button>
            <button class="btn-secondary btn-report" onclick="viewReport()">📑 View Report</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #5b7cff;">Processing your tests...</p>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="results-panel" id="resultsPanel">
            <h2>📊 Test Results</h2>
            
            <div class="results-grid">
                <div class="result-card">
                    <div class="result-number" id="totalTestsCount">0</div>
                    <div class="result-label">Total Tests</div>
                </div>
                <div class="result-card">
                    <div class="result-number passed" id="passedTestsCount">0</div>
                    <div class="result-label">Passed ✓</div>
                </div>
                <div class="result-card">
                    <div class="result-number failed" id="failedTestsCount">0</div>
                    <div class="result-label">Failed ✗</div>
                </div>
                <div class="result-card">
                    <div class="result-number" id="successRateCount">0%</div>
                    <div class="result-label">Success Rate</div>
                </div>
            </div>

            <h3 style="color: #3b82f6; margin: 20px 0 10px 0; font-size: 1.1em;">Test Details:</h3>
            <div class="test-details-list" id="testDetailsList"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/test';
        let currentTestId = null;
        let pollingInterval = null;

        function navigate(section) {
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            // Navigate to section
            if (section === 'dashboard') {
                window.location.href = '/dashboard';
            } else if (section === 'reports') {
                window.location.href = '/report';
            }
        }

        function showLoader(show = true) {
            document.getElementById('loader').classList.toggle('show', show);
        }

        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            setTimeout(() => {
                if (type !== 'success') {
                    statusEl.className = 'status-message';
                }
            }, 5000);
        }

        function showResultsPanel(show = true) {
            const panel = document.getElementById('resultsPanel');
            if (show) {
                panel.classList.add('show');
            } else {
                panel.classList.remove('show');
            }
        }

        function updateResultsDisplay(results) {
            const totalCount = results.length;
            const passedCount = results.filter(r => r.status === 'PASSED').length;
            const failedCount = totalCount - passedCount;
            const successRate = totalCount > 0 ? ((passedCount / totalCount) * 100).toFixed(2) : 0;

            document.getElementById('totalTestsCount').textContent = totalCount;
            document.getElementById('passedTestsCount').textContent = passedCount;
            document.getElementById('failedTestsCount').textContent = failedCount;
            document.getElementById('successRateCount').textContent = successRate + '%';

            // Display test details
            const detailsList = document.getElementById('testDetailsList');
            detailsList.innerHTML = results.map(test => {
                const statusClass = test.status.toLowerCase();
                const icon = test.status === 'PASSED' ? '✓' : '✗';
                return `
                    <div class="test-item ${statusClass}">
                        <div class="test-item-name">${icon} ${test.testName}</div>
                        <div class="test-item-time">Status: ${test.status} | Duration: ${test.durationMs}ms</div>
                        ${test.errorMessage ? `<div class="test-item-time" style="color: #ef4444;">Error: ${test.errorMessage}</div>` : ''}
                    </div>
                `;
            }).join('');

            showResultsPanel(true);
        }

        function pollTestStatus(testId) {
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/status/${testId}`);
                    const data = await response.json();

                    if (data.status === 'completed') {
                        clearInterval(pollingInterval);
                        showLoader(false);
                        showStatus(`✓ Tests completed successfully!`, 'success');
                        
                        if (data.results) {
                            updateResultsDisplay(data.results);
                        }
                    } else if (data.status === 'error') {
                        clearInterval(pollingInterval);
                        showLoader(false);
                        showStatus(`✗ Error: ${data.message}`, 'error');
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 500);
        }

        async function runUITest() {
            showResultsPanel(false);
            showLoader(true);
            showStatus('Starting UI tests...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/run-ui`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.testId) {
                    currentTestId = data.testId;
                    pollTestStatus(currentTestId);
                } else {
                    showLoader(false);
                    showStatus('Error: No test ID returned', 'error');
                }
            } catch (error) {
                showLoader(false);
                showStatus(`Error: ${error.message}`, 'error');
                console.error('Error running UI test:', error);
            }
        }

        async function runAPITest() {
            showResultsPanel(false);
            showLoader(true);
            showStatus('Starting API tests...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/run-api`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.testId) {
                    currentTestId = data.testId;
                    pollTestStatus(currentTestId);
                } else {
                    showLoader(false);
                    showStatus('Error: No test ID returned', 'error');
                }
            } catch (error) {
                showLoader(false);
                showStatus(`Error: ${error.message}`, 'error');
                console.error('Error running API test:', error);
            }
        }

        async function runAllTests() {
            showResultsPanel(false);
            showLoader(true);
            showStatus('Starting all tests...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/run-all`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.testId) {
                    currentTestId = data.testId;
                    pollTestStatus(currentTestId);
                } else {
                    showLoader(false);
                    showStatus('Error: No test ID returned', 'error');
                }
            } catch (error) {
                showLoader(false);
                showStatus(`Error: ${error.message}`, 'error');
                console.error('Error running all tests:', error);
            }
        }

        function viewDashboard() {
            window.location.href = '/dashboard';
        }

        function viewReport() {
            window.location.href = '/report';
        }

        // Show initial info message
        window.addEventListener('load', () => {
            showStatus('👋 Welcome! Click a button to run tests.', 'info');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
    </script>
</body>
</html>
